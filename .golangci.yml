version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - gocritic
    - unconvert
    - bodyclose
    - errorlint
    - copyloopvar
    - nilerr
    - paralleltest
  settings:
    govet:
      enable:
        - shadow
    paralleltest:
      # Ignore missing calls to `t.Parallel()` and only report incorrect uses of it.
      ignore-missing: true
      # Ignore missing calls to `t.Parallel()` in subtests.
      # Top-level tests are still required to have `t.Parallel`,
      # but subtests are allowed to skip it.
      ignore-missing-subtests: true
      # Check that `defer` is not used with `t.Parallel`.
      # (use `t.Cleanup` instead to ensure cleanup runs after parallel subtests complete).
      check-cleanup: true
    revive:
      rules:
        - name: var-naming
        - name: package-comments
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unreachable-code
        - name: indent-error-flow
    gocritic:
      disable-all: true
      enabled-checks:
        - badCall
        - badCond
        - dupArg
        - exitAfterDefer
        - sloppyLen

formatters:
  enable:
    - gofumpt
