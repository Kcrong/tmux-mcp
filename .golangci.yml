version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - gocritic
    - unconvert
    - bodyclose
    - errorlint
    - copyloopvar
  settings:
    revive:
      rules:
        - name: var-naming
        - name: package-comments
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unreachable-code
        - name: indent-error-flow
    gocritic:
      disabled-checks:
        - ifElseChain
