version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - gocritic
    - unconvert
    - bodyclose
    - errorlint
    - copyloopvar
    - nilerr
    - paralleltest
  settings:
    govet:
      enable:
        - shadow
    paralleltest:
      # Every top-level test must call `t.Parallel()` so the suite stays
      # cheap to run under -p=GOMAXPROCS — a forgotten call would silently
      # serialise that test against everything else in the package, which
      # is the exact failure mode the recent flaky-test triage chased
      # down (slog.SetDefault races + tests that ran in lock-step).
      # Default is false, but we set it explicitly so a future
      # contributor cannot quietly relax the rule.
      ignore-missing: false
      # Subtests follow the same contract. We allow the loop helper
      # itself (the `for _, tc := range cases` line) to be the spot the
      # warning fires on, because that's where `t.Run` lives — every
      # table-driven test in the repo now calls `t.Parallel()` inside
      # the t.Run body.
      ignore-missing-subtests: false
      # Pair t.Parallel with t.Cleanup, never `defer`. The order
      # `t.Parallel(); defer x()` lies: defer fires when the outer
      # test function returns, not when the parallel subtests finish,
      # so cleanup can race the bodies that still hold pointers to the
      # resource. t.Cleanup waits for parallel subtests to drain.
      check-cleanup: true
    revive:
      rules:
        - name: var-naming
        - name: package-comments
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unreachable-code
        - name: indent-error-flow
    gocritic:
      disable-all: true
      enabled-checks:
        - badCall
        - badCond
        - dupArg
        - exitAfterDefer
        - sloppyLen

formatters:
  enable:
    - gofumpt
