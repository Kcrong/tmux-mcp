# GoReleaser config for tmux-mcp.
# Docs: https://goreleaser.com
version: 2

project_name: tmux-mcp

before:
  hooks:
    - go mod tidy
    - go test ./... -count=1

builds:
  - id: tmux-mcp
    main: ./cmd/tmux-mcp
    binary: tmux-mcp
    # Pin go module file mod times to the commit timestamp so the
    # produced object/binary is byte-identical across builds of the
    # same commit. Combined with -trimpath and -buildvcs=false this
    # makes builds reproducible regardless of when they ran.
    mod_timestamp: '{{ .CommitTimestamp }}'
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
      - -buildvcs=false
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    ids:
      - tmux-mcp
    # Set archive entry timestamps to the commit time so two snapshot
    # builds of the same commit produce byte-identical tarballs.
    builds_info:
      mtime: '{{ .CommitDate }}'
    formats:
      - tar.gz
    # Windows users expect .zip; everyone else gets the default tar.gz.
    # Note: tmux itself does not run on Windows — these binaries are
    # provided for Go-toolchain-on-Windows users who ssh to a Linux/macOS
    # host or run via WSL.
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

# Generate one SPDX-JSON SBOM per archive using syft.
# Produces files like tmux-mcp_Linux_x86_64.tar.gz.sbom.json next to each archive.
#
# `cmd`/`args` are intentionally omitted: GoReleaser's defaults already invoke
# syft as `syft $artifact --output spdx-json=$document`, which is exactly what
# we want. An earlier override hardcoded `{{ .Document }}` (a Go-template
# placeholder) inside `args:`, but `args:` only honors shell-style `$document`
# substitution — Go templates have no `.Document` key in this context, which
# made the SBOM step fail with `map has no entry for key "Document"`.
sboms:
  - id: archive
    artifacts: archive
    documents:
      - '{{ .ArtifactName }}.sbom.json'

# Keyless cosign signatures using the GitHub Actions OIDC identity.
# Signs every release archive, the checksums.txt file, and each SBOM.
# Signatures (.sig) and certificates (.pem) are uploaded to the release and
# the signing event is logged to the public Rekor transparency log.
signs:
  - id: cosign-archives
    cmd: cosign
    artifacts: archive
    signature: '${artifact}.sig'
    certificate: '${artifact}.pem'
    args:
      - sign-blob
      - '--yes'
      - '--oidc-provider=github-actions'
      - '--output-signature=${signature}'
      - '--output-certificate=${certificate}'
      - '${artifact}'
    output: true

  - id: cosign-checksum
    cmd: cosign
    artifacts: checksum
    signature: '${artifact}.sig'
    certificate: '${artifact}.pem'
    args:
      - sign-blob
      - '--yes'
      - '--oidc-provider=github-actions'
      - '--output-signature=${signature}'
      - '--output-certificate=${certificate}'
      - '${artifact}'
    output: true

  - id: cosign-sbom
    cmd: cosign
    artifacts: sbom
    signature: '${artifact}.sig'
    certificate: '${artifact}.pem'
    args:
      - sign-blob
      - '--yes'
      - '--oidc-provider=github-actions'
      - '--output-signature=${signature}'
      - '--output-certificate=${certificate}'
      - '${artifact}'
    output: true

# Single multi-arch image build via the new dockers_v2 pipeline.
#
# Why dockers_v2: the legacy `dockers:` + `docker_manifests:` pair is
# deprecated and will be removed in GoReleaser v3 — see
# https://goreleaser.com/deprecations#dockers and
# https://goreleaser.com/customization/package/dockers_v2/
#
# How it works in practice:
#   - GoReleaser stages the per-platform binaries (linux/amd64/tmux-mcp,
#     linux/arm64/tmux-mcp) into a temp build context.
#   - A single `docker buildx build --platform=linux/amd64,linux/arm64`
#     produces a multi-arch manifest (and SBOM attestation) and pushes it
#     to ghcr.io directly. No more separate per-arch tags + manifest stitch.
#   - The Dockerfile uses `ARG TARGETPLATFORM` + `COPY $TARGETPLATFORM/...`
#     to pick the correct binary for each variant.
#
# OCI metadata that used to be `--label=...` build flags are now expressed
# as a `labels:` map.
dockers_v2:
  - id: tmux-mcp
    ids:
      - tmux-mcp
    images:
      - "ghcr.io/kcrong/tmux-mcp"
    tags:
      - "{{ .Version }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
    dockerfile: Dockerfile
    labels:
      "org.opencontainers.image.created": "{{ .Date }}"
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.source": "https://github.com/Kcrong/tmux-mcp"
      "org.opencontainers.image.licenses": "MIT"

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other changes
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'

release:
  prerelease: auto
  draft: false
  name_template: 'v{{ .Version }}'
  footer: |
    ---
    **Full Changelog**: https://github.com/Kcrong/tmux-mcp/compare/{{ .PreviousTag }}...{{ .Tag }}

    Verify the archive you downloaded:
    ```sh
    sha256sum -c checksums.txt --ignore-missing
    ```
