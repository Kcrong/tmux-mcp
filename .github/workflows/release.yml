name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Must already exist on origin.'
        required: true
        type: string

permissions:
  contents: write
  # Required for cosign keyless signing via GitHub Actions OIDC.
  id-token: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Install tmux (required by integration tests in goreleaser hooks)
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tmux
          tmux -V

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install syft (for SBOM generation)
        uses: anchore/sbom-action/download-syft@main

      - name: Install cosign (for keyless signing)
        uses: sigstore/cosign-installer@main

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
