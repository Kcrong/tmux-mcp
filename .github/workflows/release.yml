name: release

# Two-mode workflow:
#   1. push to main → auto-tag job computes the next semver bump from
#      conventional-commit subjects and pushes the tag. The tag push uses
#      GITHUB_TOKEN, which intentionally does NOT trigger this workflow
#      again — that breaks the loop.
#   2. workflow_dispatch with an existing tag → release job builds, signs,
#      and publishes via goreleaser. Human-gated by design: a maintainer
#      picks which tag becomes a release.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0). Must already exist on origin.'
        required: true
        type: string

permissions:
  contents: write
  # Required for cosign keyless signing via GitHub Actions OIDC.
  id-token: write
  # Required for pushing OCI images to ghcr.io.
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  auto-tag:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          # Default GITHUB_TOKEN can push tags but won't re-trigger this
          # workflow on tag push — exactly the chain-break we want.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next semver from conventional commits
        id: semver
        run: |
          set -eu
          last_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "last tag: $last_tag"

          ver=${last_tag#v}
          IFS='.' read -r major minor patch <<EOF
          $ver
          EOF
          : "${major:=0}" "${minor:=0}" "${patch:=0}"

          if [ "$last_tag" = "v0.0.0" ]; then
            range="HEAD"
          else
            range="$last_tag..HEAD"
          fi

          if [ -z "$(git log "$range" --oneline)" ]; then
            echo "no commits since $last_tag — skipping tag"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Subject + body so we can detect `BREAKING CHANGE:` footers.
          log=$(git log "$range" --format='%B%n---COMMIT---')

          bump="patch"
          if echo "$log" | grep -qE '^[a-z]+(\([^)]*\))?!:|BREAKING CHANGE:'; then
            bump="major"
          elif echo "$log" | grep -qE '^feat(\([^)]*\))?:'; then
            bump="minor"
          fi

          case "$bump" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac
          new_tag="v${major}.${minor}.${patch}"
          echo "computed bump: $bump → $new_tag"
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Push new tag
        if: steps.semver.outputs.skip != 'true'
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -eux
          new_tag="${{ steps.semver.outputs.new_tag }}"
          # Idempotent: skip if tag already exists locally or remotely.
          if git rev-parse -q --verify "refs/tags/${new_tag}" >/dev/null; then
            echo "tag ${new_tag} already exists locally — nothing to do"
            exit 0
          fi
          if git ls-remote --tags origin "${new_tag}" | grep -q "${new_tag}"; then
            echo "tag ${new_tag} already exists on origin — nothing to do"
            exit 0
          fi
          git tag -a "${new_tag}" -m "Release ${new_tag}"
          git push origin "${new_tag}"

  release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # goreleaser builds 5+ binaries, signs, and pushes multi-arch OCI images.
    # 30 minutes covers a worst-case run with cold caches.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Install tmux (required by integration tests in goreleaser hooks)
        run: |
          set -eux
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tmux
          tmux -V

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install syft (for SBOM generation)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0

      - name: Install cosign (for keyless signing)
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Set up QEMU (multi-arch docker builds)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a  # v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
