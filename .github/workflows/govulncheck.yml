name: govulncheck
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    # Weekly run so CVE drops surface even without a PR open.
    # Cron: 06:30 UTC every Wednesday — offset from CodeQL (Mon 06:00)
    # so we don't pile both scans into the same day/hour.
    - cron: '30 6 * * 3'

permissions:
  contents: read

concurrency:
  group: govulncheck-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # `changes` gate: docs-only PRs skip the vuln scan, scheduled runs
  # always proceed (path filter has no base to compare against on cron).
  #
  # Fail-open semantics: if the filter step fails for any reason (rate
  # limit, missing base ref, etc.), the fallback step sets `outputs.go=true`
  # so the govulncheck job still runs. A broken filter must never silently
  # disable vulnerability scanning.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      go: ${{ steps.filter.outputs.go || steps.fallback.outputs.go }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 2  # paths-filter needs at least the merge base locally
      - id: filter
        if: github.event_name != 'schedule'
        continue-on-error: true
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3.0.3
        with:
          # Pin the base ref so paths-filter doesn't need to discover the
          # merge base via the GitHub API (which can rate-limit).
          base: ${{ github.event.pull_request.base.sha || github.event.before || github.base_ref }}
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.github/workflows/govulncheck.yml'
      - id: fallback
        # Fail open: if the filter didn't succeed (failed, skipped, or
        # cancelled), set go=true so govulncheck runs. Schedule events also
        # fall through here because the filter step is gated off.
        if: steps.filter.outcome != 'success'
        run: echo "go=true" >> "$GITHUB_OUTPUT"

  govulncheck:
    needs: changes
    if: github.event_name == 'schedule' || needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      # Cache the govulncheck binary keyed on go.mod so we skip the
      # ~10s `go install` step until the Go toolchain version moves.
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: ~/go/bin/govulncheck
          key: govulncheck-${{ runner.os }}-${{ hashFiles('go.mod') }}

      - name: Install govulncheck
        run: |
          set -eux
          if [ ! -x ~/go/bin/govulncheck ]; then
            go install golang.org/x/vuln/cmd/govulncheck@latest
          fi

      - name: govulncheck
        run: |
          set -eux
          "$(go env GOPATH)/bin/govulncheck" ./...
