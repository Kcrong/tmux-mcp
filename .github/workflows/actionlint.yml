name: actionlint

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actionlint.yaml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/actionlint.yaml'
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # Workflow-only lint — catches typos in `uses:`, bad expressions, and
      # missing required keys before they cause a red run on main. Shellcheck
      # is disabled here; it lives in lint job's golangci-lint config instead.
      - uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8  # v2.1.2
        with:
          shellcheck: false
          fail-on-error: true
