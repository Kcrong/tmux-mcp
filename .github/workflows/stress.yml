name: stress

# Triggered after `security` completes. Runs the stress harness (race +
# leak detection) and benchmark suite (benchstat-compared against main) in
# parallel. Both are gates: a stress failure or a benchstat regression
# blocks merge-gate unless the PR carries the `expected-regression` label
# (which merge-gate honors).
#
# Baseline behavior: if there is no main baseline yet (first run, fresh
# branch state, etc.), benchstat passes automatically.

on:
  workflow_run:
    workflows: [security]
    types: [completed]

permissions:
  contents: read
  actions: read
  pull-requests: read

concurrency:
  group: stress-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    # Only run if upstream security succeeded — a CI/security failure should
    # not pile additional red onto the PR.
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      sha: ${{ steps.s.outputs.sha }}
      base_ref: ${{ steps.s.outputs.base_ref }}
      pr_number: ${{ steps.s.outputs.pr_number }}
      event: ${{ steps.s.outputs.event }}
    steps:
      - id: s
        run: |
          set -eu
          {
            echo "sha=${{ github.event.workflow_run.head_sha }}"
            echo "event=${{ github.event.workflow_run.event }}"
          } >> "$GITHUB_OUTPUT"
          # workflow_run.pull_requests is empty for fork PRs; that's fine —
          # bench job below handles the missing-baseline case.
          prs='${{ toJSON(github.event.workflow_run.pull_requests) }}'
          base=$(echo "$prs" | jq -r '.[0].base.ref // ""')
          num=$(echo "$prs" | jq -r '.[0].number // ""')
          {
            echo "base_ref=$base"
            echo "pr_number=$num"
          } >> "$GITHUB_OUTPUT"

  stress:
    needs: [preflight]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ needs.preflight.outputs.sha }}

      - name: Install tmux
        run: |
          set -eux
          if command -v tmux >/dev/null 2>&1; then
            tmux -V
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tmux
          tmux -V

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: build (sanity)
        run: go build -trimpath ./...

      - name: stress (build tag)
        env:
          # Tunables for the stress harness; defaults sized for a
          # ~2-3 minute CI run on a GHA ubuntu-latest box.
          STRESS_CREATE_KILL_ITERS: '200'
          STRESS_CONCURRENT_WORKERS: '50'
          STRESS_CONCURRENT_PER_WORKER: '50'
          STRESS_LONG_SCROLLBACK_SEQ: '5000'
          STRESS_GOROUTINE_SLACK: '5'
        run: |
          set -eux
          mkdir -p stress-artifacts
          go test \
            -tags=stress \
            -timeout=15m \
            -count=1 \
            -race \
            -memprofile=stress-artifacts/mem.pprof \
            -cpuprofile=stress-artifacts/cpu.pprof \
            -trace=stress-artifacts/trace.out \
            ./internal/server/... \
            -run='^TestStress' \
            -v 2>&1 | tee stress-artifacts/stress.log

      - name: post-run summary
        if: always()
        run: |
          set -eux
          {
            echo "## stress run summary"
            echo "ref: ${GITHUB_REF}"
            echo "sha: ${GITHUB_SHA}"
            echo "tmux: $(tmux -V)"
            echo "go: $(go version)"
            echo
            echo "### last 50 lines of stress.log"
            tail -n 50 stress-artifacts/stress.log || true
          } > stress-artifacts/summary.md

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: stress-artifacts
          path: stress-artifacts/
          retention-days: 30

  benchmarks:
    # Compares this commit's bench results against the PR base (or main on
    # main pushes) using benchstat. A regression with default p-value 0.05
    # fails the job. The `expected-regression` label is honored at the
    # merge-gate layer — this job stays a true regression detector.
    needs: [preflight]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          ref: ${{ needs.preflight.outputs.sha }}

      - name: Install tmux
        run: |
          set -eux
          if command -v tmux >/dev/null 2>&1; then
            tmux -V
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tmux
          tmux -V

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: bench (this commit)
        run: |
          set -eux
          mkdir -p bench
          go test -bench=. -benchmem -run=^$ -count=5 ./... > bench/head.txt 2>&1

      - name: bench (baseline)
        id: baseline
        run: |
          set -eux
          base_ref="${{ needs.preflight.outputs.base_ref }}"
          # Push to main → compare HEAD against HEAD~1; PR → compare against
          # PR base; fork PR with no base ref → no baseline (auto-pass).
          if [ -z "$base_ref" ] && [ "${{ needs.preflight.outputs.event }}" = "push" ]; then
            base_ref="HEAD~1"
          fi
          if [ -z "$base_ref" ]; then
            echo "no baseline available — skipping comparison"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Resolve to an actual rev so checkout below works for both branch
          # names and HEAD~N.
          if ! git rev-parse --verify "$base_ref" >/dev/null 2>&1; then
            git fetch --depth=50 origin "$base_ref" || true
            base_ref="origin/$base_ref"
          fi
          if ! git rev-parse --verify "$base_ref" >/dev/null 2>&1; then
            echo "could not resolve baseline $base_ref — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git checkout "$base_ref" -- .
          go test -bench=. -benchmem -run=^$ -count=5 ./... > bench/base.txt 2>&1 || true
          # Restore working tree to the head commit for the compare step.
          git checkout "${{ needs.preflight.outputs.sha }}" -- .
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: install benchstat
        if: steps.baseline.outputs.skip != 'true'
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: compare
        if: steps.baseline.outputs.skip != 'true'
        run: |
          set -eux
          # Default benchstat p-value (0.05) — a stat-significant regression
          # exits non-zero. Tee the report so reviewers see it in the log
          # AND in the artifact.
          "$(go env GOPATH)/bin/benchstat" -row .name bench/base.txt bench/head.txt | tee bench/benchstat.txt
          # benchstat itself does not exit non-zero on regression. Detect
          # by scanning for `+\d+\.\d+%` followed by `(p=` which is benchstat's
          # significance-marked regression line in the delta column.
          if grep -E '\+[0-9]+\.[0-9]+%[[:space:]]+\(p=' bench/benchstat.txt; then
            echo "::warning::benchstat detected a statistically significant regression"
            # Fail the job — merge-gate handles bypass via `expected-regression` label.
            exit 1
          fi
          echo "no statistically significant regression"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: benchmarks
          path: bench/
          retention-days: 30
