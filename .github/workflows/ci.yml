name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on:
      - codebuild-tmux-mcp-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: gofmt
        run: |
          set -eux
          out="$(gofmt -s -l .)"
          if [ -n "$out" ]; then
            echo "files need formatting:" >&2
            echo "$out" >&2
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go mod tidy (verify)
        run: |
          set -eux
          go mod tidy
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "go.mod/go.sum out of sync — run \`go mod tidy\` and commit" >&2
            exit 1
          fi

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61
          args: --timeout=5m

  test:
    runs-on:
      - codebuild-tmux-mcp-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4

      - name: Install tmux
        run: |
          set -eux
          if command -v tmux >/dev/null 2>&1; then
            tmux -V
            exit 0
          fi
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends tmux
          elif command -v dnf >/dev/null 2>&1; then
            sudo dnf install -y tmux
          elif command -v yum >/dev/null 2>&1; then
            sudo yum install -y tmux
          else
            echo "no supported package manager found" >&2
            exit 1
          fi
          tmux -V

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: build
        run: go build -trimpath ./...

      - name: test
        run: go test ./... -count=1 -race
