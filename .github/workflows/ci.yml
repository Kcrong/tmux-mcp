name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: '1.24'
          cache: true

      - name: gofmt
        run: |
          set -eux
          out="$(gofmt -s -l .)"
          if [ -n "$out" ]; then
            echo "files need formatting:" >&2
            echo "$out" >&2
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go mod tidy (verify)
        run: |
          set -eux
          go mod tidy
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "go.mod/go.sum out of sync — run \`go mod tidy\` and commit" >&2
            exit 1
          fi

      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee  # v9
        with:
          version: v2.12.2
          args: --timeout=5m

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install tmux
        run: |
          set -eux
          if command -v tmux >/dev/null 2>&1; then
            tmux -V
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tmux
          tmux -V

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: '1.24'
          cache: true

      - name: build
        run: go build -trimpath ./...

      - name: test (race + coverage)
        run: go test ./... -count=1 -race -covermode=atomic -coverprofile=coverage.out

      - name: coverage summary
        run: go tool cover -func=coverage.out | tail -n 40

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: coverage
          path: coverage.out
          retention-days: 14

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe  # v5
        with:
          files: coverage.out
          fail_ci_if_error: false
          # Public repo: tokenless upload works for in-repo pushes; PRs
          # from forks may be unauthenticated and silently skipped. Set
          # the CODECOV_TOKEN repo secret to lift that.
          token: ${{ secrets.CODECOV_TOKEN }}

  windows-build:
    # Cross-compile smoke test. tmux does not run on Windows, but we
    # ship Windows binaries in releases so users with a Go toolchain on
    # Windows (and a Linux/macOS host via ssh or WSL) can grab one.
    # Catches accidental Linux-only imports before they hit a release.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: cross-compile windows/amd64
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -trimpath -o tmux-mcp.exe ./cmd/tmux-mcp

      - name: cross-compile windows/arm64
        env:
          GOOS: windows
          GOARCH: arm64
        run: go build -trimpath -o tmux-mcp-arm64.exe ./cmd/tmux-mcp

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: '1.24'
          cache: true

      - name: govulncheck
        run: |
          set -eux
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

  go-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: go install from current commit
        run: |
          set -eux
          go install ./cmd/tmux-mcp
          "$(go env GOPATH)/bin/tmux-mcp" -version

  benchmarks:
    # Advisory only — does not block merge. Reviewers see the benchstat
    # comparison as a workflow artifact so perf regressions surface at
    # review time instead of slipping in silently.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: bench main
        run: |
          set -eux
          git checkout origin/${{ github.event.pull_request.base.ref }}
          go test -bench=. -benchmem -run=^$ -count=5 ./... > /tmp/main.txt 2>&1 || true

      - name: bench PR
        run: |
          set -eux
          git checkout ${{ github.event.pull_request.head.sha }}
          go test -bench=. -benchmem -run=^$ -count=5 ./... > /tmp/pr.txt 2>&1

      - name: install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: compare
        run: |
          "$(go env GOPATH)/bin/benchstat" /tmp/main.txt /tmp/pr.txt | tee benchstat.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchstat
          path: |
            /tmp/main.txt
            /tmp/pr.txt
            benchstat.txt
