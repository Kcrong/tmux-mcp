name: CI
on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  merge_group:

permissions:
  contents: read

# PR runs cancel on new push to save compute. Main / merge_group preserve
# every run so the workflow_run chain (security → stress → merge-gate)
# always has a definitive upstream conclusion to react to.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: gofmt
        run: |
          set -eux
          out="$(gofmt -s -l .)"
          if [ -n "$out" ]; then
            echo "files need formatting:" >&2
            echo "$out" >&2
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go mod tidy (verify)
        run: |
          set -eux
          go mod tidy
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "go.mod/go.sum out of sync — run \`go mod tidy\` and commit" >&2
            exit 1
          fi

      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee  # v9
        with:
          version: v2.12.2
          args: --timeout=5m

  test-linux:
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install tmux
        run: |
          set -eux
          if command -v tmux >/dev/null 2>&1; then
            tmux -V
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tmux
          tmux -V

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: build
        run: go build -trimpath ./...

      - name: test (race + coverage)
        run: go test ./... -count=1 -race -covermode=atomic -coverprofile=coverage-linux.out

      - name: coverage summary
        run: go tool cover -func=coverage-linux.out | tail -n 40

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: coverage-linux
          path: coverage-linux.out
          retention-days: 14

  test-macos:
    # Gate. Linux side already covers race detection — macOS exists to catch
    # OS-specific divergence (BSD ps, fork/exec, kqueue, brew tmux quirks).
    # Once task #220 lands build-tag classification, this will narrow to the
    # macOS-only suite via -tags=integration_macos. For now it runs the full
    # suite without -race to avoid duplicating Linux's race coverage.
    needs: [lint]
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install tmux
        run: |
          set -eux
          if command -v tmux >/dev/null 2>&1; then
            tmux -V
            exit 0
          fi
          brew install tmux
          tmux -V

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: test (macOS-specific behavior)
        run: go test ./... -count=1 -covermode=atomic -coverprofile=coverage-macos.out

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: coverage-macos
          path: coverage-macos.out
          retention-days: 14

  coverage-upload:
    # Merges Linux + macOS coverage profiles so Codecov sees the full picture.
    # Runs after both gates so a single failure on either platform stops the
    # upload — partial coverage is misleading.
    needs: [test-linux, test-macos]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: coverage-linux
          path: cov

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: coverage-macos
          path: cov

      - name: merge profiles
        # GOTOOLCHAIN=auto so `go install gocovmerge@latest` can pull the
        # newer toolchain its transitive deps require — setup-go pins the
        # local toolchain to go.mod's `go` directive (1.24.6), but recent
        # golang.org/x/tools versions need 1.25+.
        env:
          GOTOOLCHAIN: auto
        run: |
          set -eux
          go install github.com/wadey/gocovmerge@latest
          "$(go env GOPATH)/bin/gocovmerge" cov/coverage-linux.out cov/coverage-macos.out > coverage.out
          go tool cover -func=coverage.out | tail -n 40
          go tool cover -html=coverage.out -o coverage.html

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: coverage-html
          path: coverage.html
          retention-days: 14

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: coverage
          path: coverage.out
          retention-days: 14

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe  # v5
        with:
          files: coverage.out
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  install-test-linux:
    # Verifies `go install github.com/Kcrong/tmux-mcp/cmd/tmux-mcp@<sha>` works
    # end-to-end on a clean toolchain. Catches missing deps, non-vendored
    # imports, and ldflags surprises before they hit a release.
    needs: [test-linux, test-macos]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: go install from current commit
        run: |
          set -eux
          go install ./cmd/tmux-mcp
          "$(go env GOPATH)/bin/tmux-mcp" -version

  install-test-macos:
    needs: [test-linux, test-macos]
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: go install from current commit
        run: |
          set -eux
          go install ./cmd/tmux-mcp
          "$(go env GOPATH)/bin/tmux-mcp" -version

  windows-build:
    # Cross-compile smoke test. tmux does not run on Windows, but we ship
    # Windows binaries in releases. Catches accidental Linux-only imports
    # before they hit a release.
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: cross-compile windows/amd64
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -trimpath -o tmux-mcp.exe ./cmd/tmux-mcp

      - name: cross-compile windows/arm64
        env:
          GOOS: windows
          GOARCH: arm64
        run: go build -trimpath -o tmux-mcp-arm64.exe ./cmd/tmux-mcp
