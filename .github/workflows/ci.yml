name: CI
on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  merge_group:

permissions:
  contents: read

# PR runs cancel on new push to save compute. Main / merge_group preserve
# every run so the workflow_run chain (security → stress → merge-gate)
# always has a definitive upstream conclusion to react to.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: gofmt
        run: |
          set -eux
          out="$(gofmt -s -l .)"
          if [ -n "$out" ]; then
            echo "files need formatting:" >&2
            echo "$out" >&2
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go mod tidy (verify)
        run: |
          set -eux
          go mod tidy
          if ! git diff --exit-code -- go.mod go.sum; then
            echo "go.mod/go.sum out of sync — run \`go mod tidy\` and commit" >&2
            exit 1
          fi

      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee  # v9
        with:
          version: v2.12.2
          args: --timeout=5m

  test-linux:
    needs: [lint]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install tmux
        run: |
          set -eux
          if command -v tmux >/dev/null 2>&1; then
            tmux -V
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends tmux
          tmux -V

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: build
        run: go build -trimpath ./...

      # -shuffle=on randomises top-level test order per package so a
      # flake that only reproduces under a specific schedule surfaces
      # in CI rather than on a developer's laptop. Package-level
      # parallelism stays on the `go test` default (GOMAXPROCS) so the
      # runner's full CPU budget is exercised — combined with the
      # t.Parallel() calls inside individual tests, every CI run
      # exercises a different schedule.
      - name: test (race + coverage, shuffled)
        run: go test ./... -count=1 -race -shuffle=on -covermode=atomic -coverprofile=coverage-linux.out

      - name: coverage summary
        run: go tool cover -func=coverage-linux.out | tail -n 40

      # Codecov merges multiple uploads server-side per
      # https://docs.codecov.com/docs/merging-reports — flag the upload as
      # `linux` so the report keeps per-OS slices, and let test-macos
      # upload its own profile with `flags: macos`. No local merge step
      # required.
      #
      # We do NOT upload the raw .out file as a workflow artifact: Codecov
      # already keeps every upload accessible through its UI / API, so
      # mirroring the file into actions storage is duplicate retention with
      # no extra recovery story.
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe  # v5
        with:
          files: coverage-linux.out
          flags: linux
          disable_search: true
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  test-macos:
    # Gate. Linux side already covers race detection — macOS exists to catch
    # OS-specific divergence (BSD ps, fork/exec, kqueue, brew tmux quirks).
    # Once task #220 lands build-tag classification, this will narrow to the
    # macOS-only suite via -tags=integration_macos. For now it runs the full
    # suite without -race to avoid duplicating Linux's race coverage.
    needs: [lint]
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install tmux
        run: |
          set -eux
          if command -v tmux >/dev/null 2>&1; then
            tmux -V
            exit 0
          fi
          brew install tmux
          tmux -V

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      # -shuffle=on mirrors test-linux: keep CI exercising a fresh
      # schedule on every run so order flakes can't hide. -p stays at
      # the `go test` default (GOMAXPROCS) so the macOS runner's full
      # CPU budget is exercised.
      - name: test (macOS-specific behavior, shuffled)
        run: go test ./... -count=1 -shuffle=on -covermode=atomic -coverprofile=coverage-macos.out

      # Same rationale as test-linux: Codecov is the single retention
      # surface for coverage, so we don't mirror the raw .out into
      # actions/upload-artifact.
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe  # v5
        with:
          files: coverage-macos.out
          flags: macos
          disable_search: true
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  install-test-linux:
    # Verifies `go install github.com/Kcrong/tmux-mcp/cmd/tmux-mcp@<sha>` works
    # end-to-end on a clean toolchain. Catches missing deps, non-vendored
    # imports, and ldflags surprises before they hit a release.
    needs: [test-linux, test-macos]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: go install from current commit
        run: |
          set -eux
          go install ./cmd/tmux-mcp
          "$(go env GOPATH)/bin/tmux-mcp" -version

  install-test-macos:
    needs: [test-linux, test-macos]
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: go install from current commit
        run: |
          set -eux
          go install ./cmd/tmux-mcp
          "$(go env GOPATH)/bin/tmux-mcp" -version

  install-test-windows:
    # Cross-compile smoke test for the Windows release artifacts. tmux
    # does not run on Windows so we cannot exercise the binary itself,
    # but we DO ship windows/amd64 and windows/arm64 builds — this job
    # catches accidental Linux-only imports before a release surfaces
    # them. Sits at the same tier as install-test-{linux,macos}: it
    # only fires once both test-linux and test-macos are green, since
    # a binary that can't pass the unit suite isn't worth packaging.
    needs: [test-linux, test-macos]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: cross-compile windows/amd64
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -trimpath -o tmux-mcp.exe ./cmd/tmux-mcp

      - name: cross-compile windows/arm64
        env:
          GOOS: windows
          GOARCH: arm64
        run: go build -trimpath -o tmux-mcp-arm64.exe ./cmd/tmux-mcp
