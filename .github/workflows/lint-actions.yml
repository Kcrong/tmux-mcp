name: lint-actions

# Two static analyzers that complement the existing CI pipeline:
#   - actionlint: lints workflow YAML itself (shellcheck, expression
#     syntax, action input validation). Cheap, deterministic, blocking.
#   - gosec: Go security static analysis. Run informationally for now —
#     SARIF is uploaded to the Security tab so findings are visible, but
#     a positive gosec exit does NOT fail this job. Once the existing
#     baseline is triaged we can drop the `|| true` and start blocking.

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-actions-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint (workflow YAML)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Run actionlint
        # raven-actions/actionlint downloads the upstream actionlint
        # binary and runs it against every file under .github/workflows/.
        # SHA pinned to v2.1.2.
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8  # v2.1.2
        with:
          # Match shellcheck level used by upstream defaults; surface
          # everything but pyflakes-style stylistic noise.
          shellcheck: false  # leave shellcheck off until we triage existing scripts
          fail-on-error: true

  gosec:
    name: gosec (Go SAST, informational)
    # gosec runs in informational mode: findings are uploaded to the
    # Security tab via SARIF and printed to the job log, but the job
    # itself does not fail on findings. Flip `continue-on-error` off
    # (and drop the `|| true`) once the baseline is clean.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # SARIF upload to the Security tab requires security-events: write.
      # Public repos have code scanning enabled by default; if the upload
      # 403s on a fork, the step is set to continue-on-error so the job
      # still passes.
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version: '1.24'
          cache: true

      - name: Install gosec
        # Pin to a specific tag (not @latest) for reproducible CI runs.
        # Bump deliberately when upstream cuts a release we want to pull
        # in.
        run: |
          set -eux
          go install github.com/securego/gosec/v2/cmd/gosec@v2.21.4
          "$(go env GOPATH)/bin/gosec" -version

      - name: Run gosec (SARIF)
        # `|| true` keeps the job green even when gosec reports findings
        # — see the job-level note above. The SARIF file is still
        # produced for upload, so reviewers can inspect findings via the
        # Security tab.
        run: |
          set -eux
          "$(go env GOPATH)/bin/gosec" -no-fail -fmt sarif -out gosec.sarif ./... || true
          # Also print a human-readable summary to the job log so the
          # findings are visible without leaving the Actions tab.
          "$(go env GOPATH)/bin/gosec" -fmt text ./... || true

      - name: Upload SARIF to code scanning
        # Pinned to the same codeql-action SHA the rest of the repo
        # uses (see .github/workflows/codeql.yml). continue-on-error
        # so a missing code-scanning permission (e.g. fork PR without
        # the right token) does not fail the job.
        uses: github/codeql-action/upload-sarif@03e4368ac7daa2bd82b3e85262f3bf87ee112f57  # v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: gosec.sarif
          category: gosec

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: gosec-sarif
          path: gosec.sarif
          if-no-files-found: ignore
          retention-days: 14
