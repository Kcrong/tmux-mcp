name: merge-gate

# Single required check that aggregates every gate workflow's conclusion onto
# the head SHA. Branch protection only needs to require `merge-gate` —
# adding/removing upstream workflows then doesn't churn protection rules.
#
# Trigger fires on every upstream completion. Each invocation re-evaluates
# the full set, so the final upstream completion latches the gate.
#
# How conclusions get aggregated:
#   * CI / pr-title / actionlint run with pull_request / push triggers, so
#     their workflow runs are keyed to the PR head SHA — listWorkflowRunsForRepo
#     finds them via {head_sha: ...}.
#   * security / stress run with workflow_run triggers, so GitHub keys
#     their runs to the default-branch HEAD, NOT the upstream CI head.
#     They're invisible to a head_sha-based run lookup. Each of those
#     workflows posts its own commit status to the PR head SHA — we read
#     those statuses here and treat them as the workflow's conclusion.
#
# The `expected-regression` PR label bypasses ONLY the `stress` workflow
# conclusion. Lint / test / security failures still block.

on:
  workflow_run:
    workflows:
      - CI
      - security
      - stress
      - pr-title
      - actionlint
    types: [completed]

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: read
  statuses: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only react to runs that are actually attached to a PR or main push.
    # Skips fork PRs that we couldn't gate anyway.
    if: >
      github.event.workflow_run.event == 'pull_request' ||
      github.event.workflow_run.event == 'push' ||
      github.event.workflow_run.event == 'merge_group'
    steps:
      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea  # v7.0.1
        with:
          script: |
            // Workflows whose runs are keyed to the PR head SHA — direct
            // pull_request/push triggers. Looked up via run search.
            const directRequired = ['CI', 'pr-title', 'actionlint'];
            // Workflows that run via workflow_run and post their own
            // commit status. Looked up via the statuses API.
            const statusRequired = ['security', 'stress'];

            const sha = context.payload.workflow_run.head_sha;
            const labelBypass = 'expected-regression';
            const bypassable = new Set(['stress']);

            // Pull every run for this SHA. The list endpoint returns
            // newest first, so the first match per workflow_name wins.
            const runs = await github.paginate(
              github.rest.actions.listWorkflowRunsForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                head_sha: sha,
                per_page: 100,
              },
            );
            const latestRun = new Map();
            for (const r of runs) {
              if (!latestRun.has(r.name)) latestRun.set(r.name, r);
            }

            // Pull every commit status for this SHA. Newest-first; first
            // match per context wins. listCommitStatusesForRef returns the
            // entire history, so we rely on creation order to pick the
            // latest one written by each workflow.
            const statuses = await github.paginate(
              github.rest.repos.listCommitStatusesForRef,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: sha,
                per_page: 100,
              },
            );
            const latestStatus = new Map();
            for (const s of statuses) {
              if (!latestStatus.has(s.context)) latestStatus.set(s.context, s);
            }

            // Determine if this is a PR; if so check labels for bypass.
            let bypassed = false;
            const prs = context.payload.workflow_run.pull_requests || [];
            if (prs.length > 0) {
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prs[0].number,
              });
              bypassed = pr.data.labels.some(l => l.name === labelBypass);
            }

            const failing = [];
            const bypassedFails = [];
            let pending = false;

            for (const name of directRequired) {
              const r = latestRun.get(name);
              if (!r) {
                // Workflow never ran for this SHA — could be paths-ignore'd.
                // Treat as pass; the path filter is an intentional skip.
                continue;
              }
              if (r.status !== 'completed') {
                pending = true;
                continue;
              }
              const conclusion = r.conclusion;
              if (['success', 'skipped', 'neutral'].includes(conclusion)) continue;
              if (bypassed && bypassable.has(name)) {
                bypassedFails.push(`${name} (bypassed via '${labelBypass}' label)`);
                continue;
              }
              failing.push(`${name}: ${conclusion}`);
            }

            for (const name of statusRequired) {
              const s = latestStatus.get(name);
              if (!s) {
                // Status hasn't landed yet. Either the workflow_run-triggered
                // workflow is still running, or it skipped because upstream
                // CI failed. Mark as pending — when CI is failure the
                // direct-required block above will pick that up and fail
                // merge-gate anyway, so we won't sit pending forever.
                pending = true;
                continue;
              }
              if (s.state === 'pending') {
                pending = true;
                continue;
              }
              if (s.state === 'success') continue;
              if (bypassed && bypassable.has(name)) {
                bypassedFails.push(`${name} (bypassed via '${labelBypass}' label)`);
                continue;
              }
              failing.push(`${name}: ${s.state}`);
            }

            // If CI itself failed, every downstream workflow_run-triggered
            // status will sit pending forever. Detect that and short-circuit
            // so the gate fails fast with a clear reason instead of
            // appearing stuck.
            const ciRun = latestRun.get('CI');
            const ciFailed = ciRun && ciRun.status === 'completed' &&
              !['success', 'skipped', 'neutral'].includes(ciRun.conclusion);
            if (ciFailed) {
              pending = false;
            }

            let state, description;
            if (pending) {
              state = 'pending';
              description = 'Waiting on upstream workflows';
            } else if (failing.length > 0) {
              state = 'failure';
              description = `Failing: ${failing.join(', ')}`.slice(0, 140);
            } else {
              state = 'success';
              description = bypassedFails.length > 0
                ? `OK (${bypassedFails.join(', ')})`.slice(0, 140)
                : 'All required workflows passed';
            }

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state,
              context: 'merge-gate',
              description,
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

            core.info(`merge-gate → ${state}: ${description}`);
            if (bypassedFails.length > 0) core.info(`bypassed: ${bypassedFails.join(', ')}`);
