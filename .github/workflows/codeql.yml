name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    # Re-scan once a week to catch newly disclosed CVEs.
    - cron: '0 6 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Same `changes` gate as ci.yml so docs-only PRs short-circuit the
  # CodeQL build. Schedule events fall through to `analyze` regardless
  # because path-filter has nothing to compare against on a cron run
  # and we always want the weekly re-scan to execute.
  #
  # Fail-open semantics: if the filter step fails for any reason (rate
  # limit, missing base ref, etc.), the fallback step sets `outputs.go=true`
  # so the analyze job still runs. A broken filter must never silently
  # disable security scanning.
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      go: ${{ steps.filter.outputs.go || steps.fallback.outputs.go }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 2  # paths-filter needs at least the merge base locally
      - id: filter
        if: github.event_name != 'schedule'
        continue-on-error: true
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590  # v3.0.3
        with:
          # Pin the base ref so paths-filter doesn't need to discover the
          # merge base via the GitHub API (which can rate-limit).
          base: ${{ github.event.pull_request.base.sha || github.event.before || github.base_ref }}
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.github/workflows/codeql.yml'
      - id: fallback
        # Fail open: if the filter didn't succeed (failed, skipped, or
        # cancelled), set go=true so analyze runs. Schedule events also
        # fall through here because the filter step is gated off.
        if: steps.filter.outcome != 'success'
        run: echo "go=true" >> "$GITHUB_OUTPUT"

  analyze:
    name: Analyze (Go)
    needs: changes
    if: github.event_name == 'schedule' || needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          languages: go
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v4.36.0
        with:
          category: '/language:go'
